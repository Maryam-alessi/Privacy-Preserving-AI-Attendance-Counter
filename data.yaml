# YOLO Dataset Configuration
# هذا الملف يحتوي على إعدادات مجموعة البيانات

path: /path/to/dataset  # مسار مجموعة البيانات
train: images/train     # مجلد صور التدريب
val: images/val         # مجلد صور التحقق
test: images/test       # مجلد صور الاختبار

# عدد الفئات
nc: 80

# أسماء الفئات
names: ['person', 'bicycle', 'car', 'motorbike', 'aeroplane', 'bus', 'train', 'truck', 'boat', 'traffic light',
        'fire hydrant', 'stop sign', 'parking meter', 'bench', 'cat', 'dog', 'horse', 'sheep', 'cow', 'elephant',
